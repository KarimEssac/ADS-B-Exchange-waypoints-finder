<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADSB Waypoints</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    .header {
      background: linear-gradient(135deg, #161b22, #1c2333);
      padding: 14px 16px 12px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 28px;
      height: 28px;
      background: #1f6feb;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 600;
      color: #e6edf3;
    }

    .header-text p {
      font-size: 11px;
      color: #8b949e;
      margin-top: 1px;
    }

    .status-bar {
      padding: 8px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #8b949e;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #3fb950;
      flex-shrink: 0;
    }

    .status-dot.loading { background: #f0883e; }
    .status-dot.error   { background: #f85149; }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #21262d;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8b949e;
      margin-bottom: 10px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot-icon {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.3);
      flex-shrink: 0;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      inset: 0;
      background: #30363d;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      background: #e6edf3;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }

    .switch input:checked + .slider { background: #1f6feb; }
    .switch input:checked + .slider::before { transform: translateX(16px); }

    .search-section {
      padding: 12px 16px;
      border-bottom: 1px solid #21262d;
    }

    .search-box {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 7px 10px;
      color: #e6edf3;
      font-size: 13px;
      font-family: "SF Mono", Consolas, monospace;
      outline: none;
      text-transform: uppercase;
    }

    .search-box:focus { border-color: #1f6feb; }
    .search-box::placeholder { color: #484f58; text-transform: none; }

    .search-results {
      margin-top: 8px;
      max-height: 140px;
      overflow-y: auto;
    }

    .result-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .result-item:hover { background: #161b22; }

    .result-ident {
      font-family: "SF Mono", Consolas, monospace;
      font-weight: 600;
      font-size: 13px;
    }

    .result-type {
      font-size: 10px;
      color: #8b949e;
      text-transform: uppercase;
      background: #21262d;
      border-radius: 3px;
      padding: 1px 5px;
    }

    .result-coords {
      font-size: 10px;
      color: #8b949e;
      margin-top: 1px;
      font-family: monospace;
    }

    .no-results {
      text-align: center;
      color: #484f58;
      font-size: 12px;
      padding: 10px 0;
    }

    .footer {
      padding: 10px 16px;
      text-align: center;
      font-size: 10px;
      color: #484f58;
    }

    .footer a { color: #58a6ff; text-decoration: none; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">✈</div>
    <div class="header-text">
      <h1>Sweden</h1>
      <p>Flight waypoints & navaids</p>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot loading" id="statusDot"></div>
    <span id="statusText">Loading waypoint database…</span>
  </div>

  <div class="section">
    <div class="section-title">Overlay Settings</div>

    <div class="toggle-row" style="margin-bottom: 8px; border-bottom: 1px solid #21262d; padding-bottom: 12px;">
      <div class="toggle-label">
        <div class="dot-icon" style="background:#e6edf3"></div>
        <span style="font-weight: 600;">Enable Overlay</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="togEnabled" checked>
        <div class="slider"></div>
      </label>
    </div>

    <div id="subToggles" style="transition: opacity 0.2s;">
      <div class="toggle-row">
        <div class="toggle-label">
          <div class="dot-icon" style="background:#3fb950"></div>
          <span>Waypoints (Fixes)</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="togFixes" checked>
          <div class="slider"></div>
        </label>
      </div>

    <div class="toggle-row">
      <div class="toggle-label">
        <div class="dot-icon" style="background:#ffffff"></div>
        <span>Intersections</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="togIntersects" checked>
        <div class="slider"></div>
      </label>
    </div>

    <div class="toggle-row">
      <div class="toggle-label">
        <div class="dot-icon" style="background:#58a6ff"></div>
        <span>VORs / Navaids</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="togVors" checked>
        <div class="slider"></div>
      </label>
    </div>

    <div class="toggle-row">
      <div class="toggle-label">
        <div class="dot-icon" style="background:#f85149"></div>
        <span>NDBs</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="togNdbs" checked>
        <div class="slider"></div>
      </label>
    </div>
    </div>

  </div>

  <div class="search-section">
    <div class="section-title">Search Waypoint</div>
    <input
      type="text"
      class="search-box"
      id="searchBox"
      placeholder="Type fix ident (e.g. KLAX, MAIER…)"
      autocomplete="off"
      spellcheck="false"
    />
    <div class="search-results" id="searchResults"></div>
  </div>

  <div class="footer">
    Data: FAA CIFP
  </div>

  <script src="popup.js"></script>
</body>
</html>

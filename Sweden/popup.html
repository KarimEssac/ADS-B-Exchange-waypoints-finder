<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADSB Waypoints</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      transition: height 0.2s ease;
    }

    body.searching {
      min-height: 520px;
    }

    .header {
      background: linear-gradient(135deg, #161b22, #1c2333);
      padding: 14px 16px 12px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 600;
      color: #e6edf3;
    }

    .header-text p {
      font-size: 11px;
      color: #8b949e;
      margin-top: 1px;
    }

    .status-bar {
      padding: 8px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #8b949e;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #3fb950;
      flex-shrink: 0;
    }

    .status-dot.loading { background: #f0883e; }
    .status-dot.error   { background: #f85149; }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #21262d;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8b949e;
      margin-bottom: 10px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot-icon {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.3);
      flex-shrink: 0;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      inset: 0;
      background: #30363d;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      background: #e6edf3;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }

    .switch input:checked + .slider { background: #1f6feb; }
    .switch input:checked + .slider::before { transform: translateX(16px); }

    /* Area search toggle — green when All Available, blue when Current View */
    .area-toggle-row { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #21262d; }
    .area-label-usa     { font-size: 11px; font-weight: 600; transition: color 0.2s; }
    .area-label-view    { font-size: 11px; font-weight: 600; transition: color 0.2s; }
    #togAreaSearch:not(:checked) ~ .area-labels .area-label-usa  { color: #3fb950; }
    #togAreaSearch:not(:checked) ~ .area-labels .area-label-view { color: #484f58; }
    #togAreaSearch:checked       ~ .area-labels .area-label-usa  { color: #484f58; }
    #togAreaSearch:checked       ~ .area-labels .area-label-view { color: #58a6ff; }
    /* Override slider color: green for All Available (unchecked), blue for Current View (checked) */
    #togAreaSearch:not(:checked) + .slider { background: #3fb950; }
    #togAreaSearch:checked       + .slider { background: #1f6feb; }

    .search-section {
      padding: 12px 16px;
      border-bottom: 1px solid #21262d;
    }

    .search-box {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 7px 10px;
      color: #e6edf3;
      font-size: 13px;
      font-family: "SF Mono", Consolas, monospace;
      outline: none;
      text-transform: uppercase;
    }

    .search-box:focus { border-color: #1f6feb; }
    .search-box::placeholder { color: #484f58; text-transform: none; }

    .search-results {
      margin-top: 8px;
      max-height: 280px;
      overflow-y: auto;
    }

    .result-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .result-item:hover { background: #161b22; }

    .result-ident {
      font-family: "SF Mono", Consolas, monospace;
      font-weight: 600;
      font-size: 13px;
    }

    .result-type {
      font-size: 10px;
      color: #8b949e;
      text-transform: uppercase;
      background: #21262d;
      border-radius: 3px;
      padding: 1px 5px;
    }

    .result-coords {
      font-size: 10px;
      color: #8b949e;
      margin-top: 1px;
      font-family: monospace;
    }

    .no-results {
      text-align: center;
      color: #484f58;
      font-size: 12px;
      padding: 10px 0;
    }

    .footer {
      padding: 10px 16px;
      text-align: center;
      font-size: 10px;
      color: #484f58;
    }

    .footer a { color: #58a6ff; text-decoration: none; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon"><img src="icon32.png" alt="Sweden" style="width:26px;height:26px;"></div>
    <div class="header-text">
      <h1>Sweden</h1>
      <p>Flight waypoints & navaids</p>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot loading" id="statusDot"></div>
    <span id="statusText">Loading waypoint database…</span>
  </div>

  <div class="section">
    <div class="section-title">Overlay Settings</div>

    <div class="toggle-row" style="margin-bottom: 8px; border-bottom: 1px solid #21262d; padding-bottom: 12px;">
      <div class="toggle-label" style="flex-direction: column; align-items: flex-start; gap: 0;">
        <div style="display: flex; align-items: center; gap: 8px;">
          <div class="dot-icon" style="background:#e6edf3"></div>
          <span style="font-weight: 600;">Enable Overlay</span>
        </div>
        <div style="font-size: 10px; color: #8b949e; margin-left: 20px; margin-top: 4px;">Shortcut: <kbd style="background: #30363d; padding: 1px 4px; border-radius: 3px; font-family: monospace;">Shift + S</kbd></div>
      </div>
      <label class="switch">
        <input type="checkbox" id="togEnabled" checked>
        <div class="slider"></div>
      </label>
    </div>

    <div style="margin-bottom: 10px; border-bottom: 1px solid #21262d; padding-bottom: 10px;">
      <button id="btnVisualSettings" style="
        width: 100%;
        background: #21262d;
        color: #e6edf3;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: background 0.2s;
      ">
        <span style="font-size: 14px;">⚙</span>
        <span>Visual Settings</span>
      </button>
    </div>

    <!-- Visual Settings Modal -->
    <div id="visualSettingsModal" style="
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
    ">
      <div style="
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 10px;
        padding: 16px;
        width: 230px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      ">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;">
          <span style="font-weight: 600; font-size: 13px; color: #e6edf3;">Visual Settings</span>
          <span id="btnCloseVisual" style="cursor: pointer; color: #8b949e; font-size: 16px; line-height: 1;">&times;</span>
        </div>

        <div class="toggle-row" style="margin-bottom: 10px;">
          <div class="toggle-label">
            <div class="dot-icon" style="background:#58a6ff"></div>
            <span>Show Button</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="togShowBtn" checked>
            <div class="slider"></div>
          </label>
        </div>

        <div class="toggle-row" style="margin-bottom: 10px;">
          <div class="toggle-label">
            <div class="dot-icon" style="background:#8b949e"></div>
            <span>Points Visibility</span>
          </div>
          <input type="range" id="togOpacity" min="0.1" max="0.92" step="0.01" value="0.92" style="width: 60px; accent-color: #58a6ff;">
        </div>

        <div class="toggle-row">
          <div class="toggle-label">
            <div class="dot-icon" style="background:#8b949e"></div>
            <span>Label Size</span>
          </div>
          <div style="display: flex; align-items: center; gap: 6px;">
            <input type="range" id="togLabelSize" min="0.5" max="2.0" step="0.05" value="1.0" style="width: 50px; accent-color: #58a6ff;">
            <button id="btnLabelDefault" style="background:#21262d; color:#8b949e; border:1px solid #30363d; border-radius:4px; padding:2px 6px; font-size:10px; cursor:pointer; white-space:nowrap;">Default</button>
          </div>
        </div>
      </div>
    </div>
    <div id="subToggles" style="transition: opacity 0.2s;">
      <div class="toggle-row">
        <div class="toggle-label">
          <div class="dot-icon" style="background:#3fb950"></div>
          <span>Waypoints (Fixes)</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="togFixes" checked>
          <div class="slider"></div>
        </label>
      </div>

    <div class="toggle-row">
      <div class="toggle-label">
        <div class="dot-icon" style="background:#ffffff"></div>
        <span>Intersections</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="togIntersects" checked>
        <div class="slider"></div>
      </label>
    </div>

    <div class="toggle-row">
      <div class="toggle-label">
        <div class="dot-icon" style="background:#58a6ff"></div>
        <span>VORs / Navaids</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="togVors" checked>
        <div class="slider"></div>
      </label>
    </div>

    <div class="toggle-row">
      <div class="toggle-label">
        <div class="dot-icon" style="background:#f85149"></div>
        <span>NDBs</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="togNdbs" checked>
        <div class="slider"></div>
      </label>
    </div>
    </div>

  </div>

  <div class="search-section">
    <div class="section-title">Search Waypoint</div>

    <div class="toggle-row area-toggle-row">
      <div class="toggle-label">
        <div class="dot-icon" id="areaSearchDot" style="background:#3fb950"></div>
        <span id="areaSearchLabel">All Available</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="togAreaSearch">
        <div class="slider"></div>
      </label>
    </div>

    <input
      type="text"
      class="search-box"
      id="searchBox"
      placeholder="Type fix ident (e.g. KLAX, MAIER…)"
      autocomplete="off"
      spellcheck="false"
    />
    <div class="search-results" id="searchResults"></div>
  </div>

  <div class="footer">
    Data: FAA CIFP
  </div>

  <script src="popup.js"></script>
</body>
</html>
